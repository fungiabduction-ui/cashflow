*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{min-height:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--sa);overflow-x:hidden}

.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px}
.hdr{text-align:center;padding:24px 0 20px}.hdr-badge{display:inline-block;background:var(--ac);color:#000;font-family:var(--mo);font-size:9px;font-weight:700;padding:3px 10px;letter-spacing:2px;margin-bottom:10px}
.hdr h1{font-size:26px;font-weight:800;color:var(--tx);letter-spacing:-1px}.hdr h1 span{color:var(--ac)}
.hdr p{font-family:var(--mo);font-size:9px;color:var(--tx3);margin-top:6px;letter-spacing:.5px}
.card{background:var(--s1);border:1px solid var(--br);padding:16px;margin-bottom:12px}
.ct{font-family:var(--mo);font-size:8px;letter-spacing:1.5px;color:var(--ac);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}.ct::after{content:'';flex:1;height:1px;background:var(--br)}
.prod{display:grid;grid-template-columns:28px 1fr auto;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(42,42,58,.4)}.prod:last-child{border-bottom:none}
.prod-icon{font-size:18px;text-align:center}.prod-info{display:flex;flex-direction:column;gap:2px}
.prod-name{font-family:var(--mo);font-size:10px;color:var(--tx2)}.prod-sub{font-family:var(--mo);font-size:9px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;min-height:14px}
.prod-unit{color:var(--ac2)}.prod-total{color:var(--ac)}
.qwrap{display:flex;align-items:center;gap:4px}.qc{display:flex;align-items:center;border:1px solid var(--br);overflow:hidden}
.qb{background:var(--s2);border:none;color:var(--tx);font-size:20px;font-weight:300;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.qb:active{background:var(--s3)}.qb.minus:active{background:rgba(255,68,85,.15)}.qb.plus:active{background:rgba(0,229,160,.15)}
.qv{background:var(--bg);color:var(--tx);font-family:var(--mo);font-size:15px;font-weight:700;width:46px;height:42px;text-align:center;border:none;border-left:1px solid var(--br);border-right:1px solid var(--br);outline:none;-webkit-appearance:none;padding:0}
.qv::-webkit-outer-spin-button,.qv::-webkit-inner-spin-button{-webkit-appearance:none}.qv[type=number]{-moz-appearance:textfield}.qv.dec{width:52px;font-size:12px}
.qrst{background:none;border:1px solid var(--br);color:var(--tx3);font-size:12px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qrst:active{border-color:var(--er);color:var(--er)}.dv{height:1px;background:var(--br);margin:8px 0}
.slbl{font-family:var(--mo);font-size:8px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;margin-bottom:10px}
.tramo-banner{background:var(--s2);border:1px solid var(--br);border-left:3px solid var(--ac);padding:10px 14px;margin:10px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:var(--mo);font-size:10px}
.tramo-label{color:var(--tx3);font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}.tramo-val{color:var(--ac);font-weight:700;font-size:13px}
.ahorro-banner{background:rgba(255,170,0,.08);border:1px solid rgba(255,170,0,.25);border-left:3px solid var(--wn);padding:10px 14px;display:none;align-items:center;gap:10px;font-family:var(--mo);font-size:10px;margin-top:6px}
.ahorro-banner.visible{display:flex}.ahorro-icon{font-size:20px;flex-shrink:0}.ahorro-text{display:flex;flex-direction:column;gap:2px}
.ahorro-lbl{color:var(--tx3);font-size:8px;letter-spacing:1px;text-transform:uppercase}.ahorro-amt{color:var(--wn);font-weight:700;font-size:16px}.ahorro-sub{color:var(--tx3);font-size:8px}
.motiv{background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.2);border-left:3px solid var(--ac);padding:11px 14px;display:none;margin-top:6px;font-family:var(--mo)}
.motiv.visible{display:block}.motiv-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}.motiv-icon{font-size:18px;flex-shrink:0}
.motiv-msg{font-size:10px;color:var(--tx2);line-height:1.5}.motiv-msg strong{color:var(--ac)}
.motiv-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:6px}.motiv-bar-bg{flex:1;height:5px;background:var(--br);border-radius:3px;overflow:hidden}
.motiv-bar-fill{height:100%;background:var(--ac);border-radius:3px;transition:width .3s}.motiv-bar-pct{font-family:var(--mo);font-size:8px;color:var(--ac);flex-shrink:0;width:28px;text-align:right}
.total-sec{background:var(--s2);border:1px solid var(--br);padding:16px;margin-bottom:12px}
.total-row-line{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-family:var(--mo);font-size:10px}.total-row-line .lbl{color:var(--tx3)}.total-row-line .val{color:var(--tx)}
.total-sep{height:1px;background:var(--br);margin:8px 0}.total-main{display:flex;justify-content:space-between;align-items:flex-end;padding:8px 0 4px}
.total-lbl{font-family:var(--mo);font-size:9px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase}.total-amt{font-family:var(--mo);font-size:28px;font-weight:700;color:var(--ac)}
.total-usdt{font-family:var(--mo);font-size:11px;color:var(--ac2);margin-top:3px}
.ahorro-total{background:rgba(255,170,0,.06);border:1px solid rgba(255,170,0,.2);padding:12px 14px;margin-bottom:4px;display:none}.ahorro-total.visible{display:block}
.ahorro-total-inner{display:flex;align-items:center;justify-content:space-between;gap:8px}.ahorro-total-left{display:flex;align-items:center;gap:10px}.ahorro-total-icon{font-size:22px}
.ahorro-total-text .lbl{font-family:var(--mo);font-size:8px;letter-spacing:1px;color:var(--tx3);text-transform:uppercase;margin-bottom:3px}
.ahorro-total-text .amt{font-family:var(--mo);font-size:18px;font-weight:700;color:var(--wn)}.ahorro-total-text .sub{font-family:var(--mo);font-size:8px;color:var(--tx3);margin-top:2px}
.ahorro-pct{font-family:var(--mo);font-size:22px;font-weight:700;color:var(--wn);background:rgba(255,170,0,.12);padding:6px 12px}
label{font-family:var(--mo);font-size:8px;letter-spacing:.8px;color:var(--tx2);display:block;margin-bottom:4px;text-transform:uppercase}
input,select{width:100%;background:var(--bg);border:1px solid var(--br);color:var(--tx);font-family:var(--mo);font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none;border-radius:0;transition:border-color .2s;min-height:46px}
input:focus,select:focus{border-color:var(--ac)}select option{background:var(--bg)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tog-row{display:flex;gap:6px;margin-top:5px}.tgb{background:var(--s2);border:1px solid var(--br);color:var(--tx2);font-family:var(--mo);font-size:11px;padding:10px 16px;cursor:pointer;min-height:46px;flex:1;font-weight:700;letter-spacing:1px}
.tgb.active{background:var(--ac);color:#000;border-color:var(--ac)}
.gbtn{background:var(--ac);color:#000;font-family:var(--mo);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;padding:16px;width:100%;min-height:54px;margin-bottom:12px}.gbtn:active{background:#00c888}
.ticket-wrap{display:none}.ticket-wrap.visible{display:block}
.ticket-out{background:var(--bg);border:1px solid var(--br);border-left:3px solid var(--ac);padding:16px;font-family:var(--mo);font-size:11px;line-height:2;white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.ticket-actions{display:flex;gap:8px;flex-wrap:wrap}
.tbtn{background:var(--s2);border:1px solid var(--br);color:var(--tx2);font-family:var(--mo);font-size:9px;letter-spacing:.8px;padding:10px 14px;cursor:pointer;text-transform:uppercase;flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;gap:6px}
.tbtn:active{border-color:var(--ac);color:var(--ac)}.tbtn.reset{flex:0 0 auto;border-color:var(--er);color:var(--er)}.tbtn.reset:active{background:var(--er);color:#fff}
.tbtn.wa{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.4);color:var(--ac)}
.notif{position:fixed;bottom:14px;right:14px;left:14px;background:var(--ac);color:#000;font-family:var(--mo);font-size:11px;font-weight:700;padding:11px 18px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s ease;text-align:center;max-width:480px;margin:0 auto}
.notif.show{transform:translateY(0);opacity:1}.footer{text-align:center;padding:20px 0;font-family:var(--mo);font-size:8px;color:var(--tx3);letter-spacing:.5px}
@media(min-width:520px){.wrap{padding:24px 16px}.hdr{padding:32px 0 24px}.hdr h1{font-size:32px}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--br)}
</style>
</head>

  <div><label>Tipo de pago</label><div class="tog-row"><button class="tgb active" id="btnARS" onclick="setTP('ARS')">ARS</button><button class="tgb" id="btnUSDT" onclick="setTP('USDT')">USDT</button></div></div>

</div>
<div class="ahorro-total" id="ahorroTotal"><div class="ahorro-total-inner"><div class="ahorro-total-left"><div class="ahorro-total-icon">🎁</div><div class="ahorro-total-text"><div class="lbl">Tu ahorro total por volumen</div><div class="amt" id="ahorroTotalAmt">—</div><div class="sub" id="ahorroTotalSub"></div></div></div><div class="ahorro-pct" id="ahorroPct">—</div></div></div>
<div class="total-sec"><div id="desglose"></div><div class="total-sep" id="sepMain" style="display:none"></div><div class="total-main"><div><div class="total-lbl">Total a pagar</div><div class="total-amt" id="totalAmt">$ 0</div><div class="total-usdt" id="totalUsdt" style="display:none"></div></div><button class="gbtn" style="width:auto;padding:14px 24px;margin:0;font-size:12px" onclick="generarTicket()">🧾 GENERAR</button></div></div>
<div class="ticket-wrap" id="ticketWrap"><div class="card" style="margin-bottom:10px"><div class="ct">🧾 Tu pedido</div><div class="ticket-out" id="ticketOut"></div></div><div class="ticket-actions"><button class="tbtn" onclick="copiar()">⎘ Copiar ticket</button><button class="tbtn wa" onclick="compartirWA()">📲 WhatsApp</button><button class="tbtn reset" onclick="resetear()">↺</button></div></div>
<div class="footer" id="cfg-footer"></div>

function fi(n){return Math.round(n).toLocaleString('es-AR');}
function fv(n){return '$ '+fi(n);}
function fu(n){return parseFloat(n.toFixed(2)).toLocaleString('en-US',{minimumFractionDigits:2});}
function gn(id){const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;}
function gtr(tb,q){if(!tb||q<=0)return null;let best=tb[0];for(let i=0;i<tb.length;i++){if(q>=tb[i].t)best=tb[i];}return best;}
function calcAhorro(tramos,q,p){return q>0?q*(tramos[0].p-p):0;}
function nextTramo(tramos,q){for(let i=0;i<tramos.length;i++){if(q<tramos[i].t)return{...tramos[i],faltan:tramos[i].t-q};}return null;}
function applyTexts(){const e=id=>document.getElementById(id);if(e('cfg-badge'))e('cfg-badge').textContent=CFG.badge||'';if(e('cfg-titulo'))e('cfg-titulo').childNodes[0].textContent=(CFG.titulo||'')+' ';if(e('cfg-titulo-span'))e('cfg-titulo-span').textContent=CFG.tituloSpan||'';if(e('cfg-subtitulo'))e('cfg-subtitulo').textContent=CFG.subtitulo||'';if(e('cfg-footer'))e('cfg-footer').textContent=CFG.footer||'';if(CFG.whatsapp)window._wa=CFG.whatsapp.replace(/\D/g,'');}
function renderProductos(){let html='';CFG.grupos.forEach(g=>{if(!g.tramos||!g.tramos.length)return;html+='<div class="card" id="card-'+g.id+'"><div class="ct">'+g.label+'</div>';if(g.tipo==='consolidado'&&g.consolidadoLabel)html+='<div class="slbl">'+g.consolidadoLabel+'</div>';g.variantes.forEach(v=>{const isG=g.unidad==='g';html+='<div class="prod"><div class="prod-icon">'+v.icon+'</div><div class="prod-info"><div class="prod-name">'+v.nombre+'</div><div class="prod-sub"><span class="prod-unit" id="up-'+v.id+'">—</span><span class="prod-total" id="pt-'+v.id+'"></span></div></div><div class="qwrap"><div class="qc"><button class="qb minus" onclick="adj(\''+v.id+'\',−1)">−</button><input class="'+(isG?'qv dec':'qv')+'" type="number" min="0" step="1" id="q-'+v.id+'" placeholder="0" oninput="upd()"><button class="qb plus" onclick="adj(\''+v.id+'\',1)">+</button></div><button class="qrst" onclick="rst(\''+v.id+'\')" >×</button></div></div>';});if(g.tipo==='consolidado')html+='<div class="tramo-banner" id="tramoBanner-'+g.id+'" style="display:none"><div><div class="tramo-label">Tramo activo</div><div class="tramo-val" id="tramoVal-'+g.id+'">—</div></div><div style="text-align:right"><div class="tramo-label">Precio unitario</div><div class="tramo-val" id="tramoPrecio-'+g.id+'">—</div></div></div>';if(g.motivarHacia&&g.tramos.length>1)html+='<div class="motiv" id="motiv-'+g.id+'"><div class="motiv-top"><div class="motiv-icon">🚀</div><div class="motiv-msg" id="motiv-msg-'+g.id+'"></div></div><div class="motiv-bar-wrap"><div class="motiv-bar-bg"><div class="motiv-bar-fill" id="motiv-bar-'+g.id+'" style="width:0%"></div></div><div class="motiv-bar-pct" id="motiv-pct-'+g.id+'">0%</div></div></div>';if(g.tramos.length>1)html+='<div class="ahorro-banner" id="ahorro-'+g.id+'"><div class="ahorro-icon">🏷</div><div class="ahorro-text"><div class="ahorro-lbl">Ahorro por volumen</div><div class="ahorro-amt" id="ahorroAmt-'+g.id+'">—</div><div class="ahorro-sub" id="ahorroSub-'+g.id+'"></div></div></div>';html+='</div>';});document.getElementById('productos-container').innerHTML=html;}
function sp(id,q,pr,tl){const u=document.getElementById('up-'+id),p=document.getElementById('pt-'+id);if(q>0&&pr!=null){if(u){u.textContent=fv(pr)+'/'+( (id.endsWith('_g')||false)?'g':'ud');u.style.color='var(--ac2)';}if(p){p.textContent=' → '+fv(tl);p.style.color='var(--ac)';}}else{if(u){u.textContent='—';u.style.color='var(--tx3)';}if(p)p.textContent='';}}
function sp2(id,q,pr,tl,unidad){const u=document.getElementById('up-'+id),p=document.getElementById('pt-'+id);if(q>0&&pr!=null){if(u){u.textContent=fv(pr)+'/'+(unidad||'ud');u.style.color='var(--ac2)';}if(p){p.textContent=' → '+fv(tl);p.style.color='var(--ac)';}}else{if(u){u.textContent='—';u.style.color='var(--tx3)';}if(p)p.textContent='';}}
function updMotiv(g,q,prActual){const motivEl=document.getElementById('motiv-'+g.id);if(!motivEl)return;const nxt=nextTramo(g.tramos,q);if(!nxt||!prActual){motivEl.classList.remove('visible');return;}const qN=nxt.t,pN=nxt.p,ahorroAd=(q+nxt.faltan)*(prActual-pN);const pctDesc=((1-pN/g.tramos[0].p)*100).toFixed(0);const ta=gtr(g.tramos,q);const tBase=ta?ta.t:0;const pct=Math.min(100,Math.round(((q-tBase)/(nxt.t-tBase))*100));const msgEl=document.getElementById('motiv-msg-'+g.id);if(msgEl){const u=g.unidad||'ud';msgEl.innerHTML='Llevá <strong>'+nxt.faltan+' '+u+' más</strong> y bajás a <strong>'+fv(pN)+'/'+u+'</strong><br><span style="color:var(--wn)">ahorrás '+fv(ahorroAd>0?ahorroAd:0)+' adicionales ('+pctDesc+'% desc.)</span>';}const bEl=document.getElementById('motiv-bar-'+g.id);const pEl=document.getElementById('motiv-pct-'+g.id);if(bEl)bEl.style.width=pct+'%';if(pEl)pEl.textContent=pct+'%';motivEl.classList.add('visible');}
let tipoPago='ARS';
function setTP(t){tipoPago=t;document.getElementById('btnARS').classList.toggle('active',t==='ARS');document.getElementById('btnUSDT').classList.toggle('active',t==='USDT');document.getElementById('tcRow').style.display=t==='USDT'?'block':'none';upd();}
function adj(k,d){const el=document.getElementById('q-'+k);if(!el)return;const cur=parseFloat(el.value)||0;const n=Math.max(0,cur+d);el.value=n===0?'':n;upd();}
function rst(k){const el=document.getElementById('q-'+k);if(el){el.value='';upd();}}
function upd(){let tG=0,aG=0;const dl=[];CFG.grupos.forEach(g=>{if(!g.tramos||!g.tramos.length)return;let tQ=0;if(g.tipo==='consolidado')g.variantes.forEach(v=>{tQ+=gn('q-'+v.id);});else tQ=gn('q-'+g.variantes[0].id);const v0=g.variantes[0];if(g.maxSinConsulta&&tQ>=g.maxSinConsulta+1){g.variantes.forEach(v=>{const u=document.getElementById('up-'+v.id);if(u){u.textContent=(g.maxSinConsulta+1)+(g.unidad||'')+'+ consultar';u.style.color='var(--wn)';}const p=document.getElementById('pt-'+v.id);if(p)p.textContent='';});const ah=document.getElementById('ahorro-'+g.id);if(ah)ah.classList.remove('visible');const mo=document.getElementById('motiv-'+g.id);if(mo)mo.classList.remove('visible');return;}const r=gtr(g.tramos,tQ);const pr=r?r.p:null;const tl=pr&&tQ>0?tQ*pr:0;if(g.tipo==='consolidado'){if(tQ>0&&pr!=null)g.variantes.forEach(v=>{const q=gn('q-'+v.id);sp2(v.id,q,pr,q*pr,g.unidad||'ud');});else g.variantes.forEach(v=>{sp2(v.id,0,null,0,g.unidad);});const tb=document.getElementById('tramoBanner-'+g.id);if(tb){if(tQ>0&&r){tb.style.display='flex';document.getElementById('tramoVal-'+g.id).textContent='Tramo '+r.t+' ('+tQ+' ud)';document.getElementById('tramoPrecio-'+g.id).textContent=fv(pr)+' c/u';}else tb.style.display='none';}}else{sp2(v0.id,tQ,pr,tl,g.unidad||'ud');}if(g.motivarHacia&&tQ>0&&pr!=null)updMotiv(g,tQ,pr);else{const me=document.getElementById('motiv-'+g.id);if(me)me.classList.remove('visible');}const ah=calcAhorro(g.tramos,tQ,pr||g.tramos[0].p);const ahEl=document.getElementById('ahorro-'+g.id);if(ahEl){if(ah>0&&tQ>0&&pr!=null){ahEl.classList.add('visible');document.getElementById('ahorroAmt-'+g.id).textContent=fv(ah);document.getElementById('ahorroSub-'+g.id).textContent='vs comprar '+tQ+(g.unidad||'ud')+' al precio mínimo ('+fv(g.tramos[0].p)+'/'+(g.unidad||'ud')+')';}else ahEl.classList.remove('visible');}if(tl>0)dl.push({lbl:g.label.split(' ').slice(1).join(' ')+' ('+tQ+(g.unidad||'ud')+' × '+fv(pr||0)+')',val:fv(tl)});tG+=tl;aG+=ah&&tQ>0&&pr!=null?calcAhorro(g.tramos,tQ,pr):0;});const dEl=document.getElementById('desglose');const sEl=document.getElementById('sepMain');if(dEl){if(dl.length){dEl.innerHTML=dl.map(l=>'<div class="total-row-line"><span class="lbl">'+l.lbl+'</span><span class="val">'+l.val+'</span></div>').join('');if(sEl)sEl.style.display='block';}else{dEl.innerHTML='';if(sEl)sEl.style.display='none';}}document.getElementById('totalAmt').textContent=fv(tG);const tcv=parseFloat(document.getElementById('tc').value)||0;const uEl=document.getElementById('totalUsdt');if(uEl){if(tipoPago==='USDT'&&tcv>0){uEl.textContent='≈ '+fu(tG/tcv)+' USDT (TC: '+fv(tcv)+')';uEl.style.display='block';}else uEl.style.display='none';}const atEl=document.getElementById('ahorroTotal');if(atEl){if(aG>0&&tG>0){atEl.classList.add('visible');document.getElementById('ahorroTotalAmt').textContent=fv(aG);const pct=((aG/(tG+aG))*100).toFixed(0);document.getElementById('ahorroPct').textContent=pct+'%';document.getElementById('ahorroTotalSub').textContent='Ahorrás '+pct+'% respecto al precio unitario';}else atEl.classList.remove('visible');}}
function generarTicket(){let hayAlgo=false,tG=0,aG=0;const tcv=parseFloat(document.getElementById('tc').value)||0;if(tipoPago==='USDT'&&tcv<=0){sN('Ingresá el tipo de cambio para USDT');return;}let tk='🧾 COTIZACIÓN DE PEDIDO\n';const nombre=document.getElementById('nombre').value.trim();const nota=document.getElementById('nota').value.trim();const now=new Date();const fecha=String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+now.getFullYear();tk+='📅 '+fecha;if(nombre)tk+=' · 👤 '+nombre;tk+='\n\n🛒 Detalle\n\n';CFG.grupos.forEach(g=>{if(!g.tramos||!g.tramos.length)return;let tQ=0;if(g.tipo==='consolidado')g.variantes.forEach(v=>{tQ+=gn('q-'+v.id);});else tQ=gn('q-'+g.variantes[0].id);if(tQ<=0)return;if(g.maxSinConsulta&&tQ>=g.maxSinConsulta+1){sN(g.label+': '+(g.maxSinConsulta+1)+(g.unidad||'')+'+ requiere consulta directa');return;}const r=gtr(g.tramos,tQ);if(!r)return;const pr=r.p,tl=tQ*pr;hayAlgo=true;if(g.tipo==='consolidado'){g.variantes.forEach(v=>{const q=gn('q-'+v.id);if(q>0)tk+=v.icon+' '+(v.nombre).padEnd(12)+' '+q+' ud × '+fv(pr)+' = '+fv(q*pr)+'\n';});tk+='   ↳ Tramo '+r.t+' · '+fv(pr)+'/ud ('+tQ+' uds total)\n';}else{const v=g.variantes[0];tk+=v.icon+' '+(v.nombre).padEnd(14)+' '+tQ+(g.unidad||'ud')+' × '+fv(pr)+' = '+fv(tl)+'\n';}const ah=calcAhorro(g.tramos,tQ,pr);if(ah>0)tk+='   🏷 Ahorro: '+fv(ah)+'\n';tG+=tl;aG+=ah;tk+='\n';});if(!hayAlgo){sN('Agregá al menos un producto');return;}tk+='────────────────────────\n💰 TOTAL: '+fv(tG);if(tipoPago==='USDT'&&tcv>0)tk+='\n💵 En USDT: '+fu(tG/tcv)+' U (TC '+fv(tcv)+')';if(aG>0){const pct=((aG/(tG+aG))*100).toFixed(0);tk+='\n\n🎁 Ahorro por volumen: '+fv(aG)+' ('+pct+'%)';}if(nota)tk+='\n📝 '+nota;document.getElementById('ticketOut').textContent=tk;const tw=document.getElementById('ticketWrap');tw.classList.add('visible');tw.scrollIntoView({behavior:'smooth',block:'start'});}
function copiar(){navigator.clipboard.writeText(document.getElementById('ticketOut').textContent).then(()=>sN('✓ Ticket copiado'));}
function compartirWA(){const txt=document.getElementById('ticketOut').textContent;const wa=window._wa||'';const url=wa?'https://wa.me/'+wa+'?text='+encodeURIComponent(txt):'https://wa.me/?text='+encodeURIComponent(txt);if(navigator.share)navigator.share({title:'Mi pedido',text:txt}).catch(()=>window.open(url,'_blank'));else window.open(url,'_blank');}
function resetear(){CFG.grupos.forEach(g=>g.variantes.forEach(v=>{const el=document.getElementById('q-'+v.id);if(el)el.value='';}));['nombre','nota','tc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});setTP('ARS');document.getElementById('ticketWrap').classList.remove('visible');upd();window.scrollTo({top:0,behavior:'smooth'});}
function sN(msg){const el=document.getElementById('notif');el.textContent=msg;el.className='notif show';clearTimeout(window._nt);window._nt=setTimeout(()=>el.classList.remove('show'),3200);}
applyTexts();renderProductos();upd();
</script></body></html>
